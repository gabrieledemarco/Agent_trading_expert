<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>Pipeline | Agent Trading</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{background:var(--bg-primary);color:var(--text-secondary);font-family:var(--font);font-size:12px;height:100%;overflow:hidden;}
    .terminal{display:grid;grid-template-columns:190px 1fr;grid-template-rows:40px 1fr 24px;height:100vh;transition:grid-template-columns .3s ease;}
    .terminal.sidebar-collapsed{grid-template-columns:50px 1fr;}
    .topbar{grid-column:1/-1;background:var(--bg-secondary);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 12px;}
    .topbar-left{display:flex;align-items:center;gap:12px;}
    .sidebar-toggle{background:transparent;border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;padding:6px 10px;font-size:14px;font-family:var(--font);transition:all .2s;}
    .sidebar-toggle:hover{border-color:var(--orange);color:var(--orange);}
    .topbar-brand{color:var(--orange);font-size:14px;font-weight:bold;}
    .topbar-brand span{background:var(--orange);color:#000;padding:2px 6px;border-radius:2px;font-size:10px;}
    .topbar-actions{display:flex;gap:6px;}
    .btn{background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-secondary);padding:4px 10px;font-size:10px;cursor:pointer;font-family:var(--font);}
    .btn:hover{background:var(--orange);color:#000;border-color:var(--orange);}
    .btn-orange{background:var(--orange-a15);border-color:var(--orange);color:var(--orange);}
    .btn-orange:hover{background:var(--orange);color:#000;}
    .sidebar{background:var(--bg-secondary);border-right:1px solid var(--border);padding:8px 0;display:flex;flex-direction:column;overflow-y:scroll;}
    .sidebar-section{margin-bottom:10px;}
    .sidebar-title{padding:4px 12px;color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;transition:opacity .2s;}
    .sidebar-collapsed .sidebar-title{opacity:0;height:0;padding:0;overflow:hidden;}
    .sidebar-item{padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text-secondary);font-size:11px;white-space:nowrap;transition:all .2s;}
    .sidebar-collapsed .sidebar-item{padding:6px 0;justify-content:center;gap:0;}
    .sidebar-item:hover{background:var(--bg-tertiary);}
    .sidebar-item.active{color:var(--orange);background:var(--bg-tertiary);border-left:2px solid var(--orange);}
    .status-indicator{margin-top:auto;padding:8px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:10px;white-space:nowrap;}
    .status-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .main{background:var(--bg-primary);overflow-y:scroll;padding:8px;}
    .bottombar{grid-column:1/-1;background:var(--bg-secondary);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-size:10px;color:var(--text-muted);justify-content:space-between;}

    .kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:8px;}
    .kpi{background:var(--bg-secondary);border:1px solid var(--border);padding:8px;text-align:center;}
    .kpi-label{color:var(--text-muted);font-size:9px;text-transform:uppercase;margin-bottom:3px;}
    .kpi-value{font-size:15px;font-weight:bold;}
    .phase-actions{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap;align-items:center;}
    .board-wrap{overflow-x:auto;margin-bottom:8px;}
    .board{display:grid;grid-template-columns:repeat(9,minmax(150px,1fr));gap:8px;min-width:1200px;}
    .col{background:var(--bg-secondary);border:1px solid var(--border);padding:8px;min-height:200px;}
    .col-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    .col-title{color:var(--orange);font-size:10px;text-transform:uppercase;font-weight:bold;}
    .col-count{background:var(--bg-tertiary);color:var(--text-muted);padding:1px 6px;border-radius:2px;font-size:9px;}
    .kanban-card{border:1px solid var(--border);background:var(--bg-primary);padding:6px;margin-bottom:5px;cursor:default;}
    .kanban-card:hover{border-color:var(--orange);}
    .kanban-card-name{font-size:10px;color:var(--text-primary);font-weight:bold;margin-bottom:3px;}
    .kanban-card-meta{font-size:9px;color:var(--text-muted);}
    .empty{color:var(--text-muted);font-size:10px;text-align:center;padding:20px 0;}
    .msg{padding:6px 10px;font-size:10px;border-radius:2px;margin-bottom:8px;}
    .msg-ok{background:var(--green-a10);color:var(--green);border:1px solid var(--green-a20);}
    .msg-err{background:var(--red-a10);color:var(--red);border:1px solid var(--red-a20);}
    ::-webkit-scrollbar{width:8px;height:8px;}
    ::-webkit-scrollbar-track{background:var(--bg-primary);}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  </style>
</head>
<body>
<div class="terminal">
  <header class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
      <div class="topbar-brand"><span>TA</span> PIPELINE — KANBAN</div>
    </div>
    <div class="topbar-actions">
      <button class="btn" onclick="load()">↻ Refresh</button>
      <button class="btn btn-orange" onclick="runPipeline()">▶ Run Full Pipeline</button>
    </div>
  </header>

  <nav class="sidebar"></nav>

  <main class="main">
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Total Strategies</div><div class="kpi-value neutral" id="kpiTotal">—</div></div>
      <div class="kpi"><div class="kpi-label">Approved</div><div class="kpi-value" style="color:var(--green)" id="kpiApproved">—</div></div>
      <div class="kpi"><div class="kpi-label">In Progress</div><div class="kpi-value" style="color:var(--blue)" id="kpiProgress">—</div></div>
      <div class="kpi"><div class="kpi-label">Human Review</div><div class="kpi-value" style="color:var(--yellow)" id="kpiHuman">—</div></div>
      <div class="kpi"><div class="kpi-label">Deployed</div><div class="kpi-value" style="color:var(--orange)" id="kpiDeployed">—</div></div>
    </div>
    <div class="phase-actions">
      <span style="color:var(--text-muted);font-size:10px;align-self:center;">Run phase:</span>
      <button class="btn" onclick="runPhase('research')">Research</button>
      <button class="btn" onclick="runPhase('spec')">Spec</button>
      <button class="btn" onclick="runPhase('ml')">ML Train</button>
      <button class="btn" onclick="runPhase('validation')">Validate</button>
      <button class="btn" onclick="runPhase('improvement')">Improve</button>
    </div>
    <div id="pipelineMsg" style="display:none;"></div>

    <div class="board-wrap"><div class="board" id="board"></div></div>
  </main>

  <footer class="bottombar"><!-- freshness -->
    <div id="boardMeta">Pipeline Kanban — auto-refresh 10s</div>
    <div>Agent Trading Expert — V2</div>
  </footer>
</div>

<script>
const esc = window.DU ? DU.escape : function(s){var m={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'};return String(s==null?'':s).replace(/[&<>"']/g,function(c){return m[c];});};
const COLUMNS = [
  'draft', 'backtest_pending', 'backtest_running',
  'validation_pending', 'approved', 'warning',
  'rejected', 'human_review', 'deployed',
];

function colColor(status) {
  if (status === 'approved' || status === 'deployed') return 'var(--green)';
  if (status === 'rejected') return 'var(--red)';
  if (status === 'warning' || status === 'human_review') return 'var(--yellow)';
  if (status.includes('running') || status.includes('pending')) return 'var(--blue)';
  return 'var(--orange)';
}

async function loadStatus() {
  try {
    const d = await fetch('/api/pipeline/overview').then(r => r.json());
    const by = d.by_status || {};
    const total = d.total_strategies ?? 0;
    const progress = (by.backtest_pending||0)+(by.backtest_running||0)+(by.validation_pending||0);
    document.getElementById('kpiTotal').textContent    = total;
    document.getElementById('kpiApproved').textContent = by.approved || 0;
    document.getElementById('kpiProgress').textContent = progress;
    document.getElementById('kpiHuman').textContent    = by.human_review || 0;
    document.getElementById('kpiDeployed').textContent = by.deployed || 0;
  } catch (e) { console.warn('loadStatus:', e); }
}

async function load() {
  try {
    const r = await fetch('/api/pipeline/kanban');
    const data = await r.json();
    const map = data.columns || {};
    const total = data.count || 0;

    document.getElementById('board').innerHTML = COLUMNS.map(c => {
      const cards = map[c] || [];
      const cardHtml = cards.length
        ? cards.map(s => `
          <div class="kanban-card">
            <div class="kanban-card-name">${esc(s.name || s.id || '—')}</div>
            <div class="kanban-card-meta">retry: ${s.retry_count || 0} · ${esc(String(s.updated_at || '').slice(0, 10))}</div>
          </div>`).join('')
        : '<div class="empty">empty</div>';
      return `
        <div class="col">
          <div class="col-header">
            <div class="col-title" style="color:${colColor(c)}">${c}</div>
            <div class="col-count">${cards.length}</div>
          </div>
          ${cardHtml}
        </div>`;
    }).join('');

    document.getElementById('boardMeta').textContent = `Pipeline Kanban — ${total} strategies — auto-refresh 10s`;
  } catch (e) {
    document.getElementById('board').innerHTML = '<div style="color:var(--red);padding:8px">Error loading pipeline data.</div>';
  }
}

async function runPhase(phase) {
  showMsg(`Starting phase: ${phase}…`, 'ok');
  try {
    const r = await fetch(`/api/pipeline/run/${phase}`, { method: 'POST' });
    const d = await r.json();
    showMsg(`✓ Phase "${phase}" started in background.`, 'ok');
  } catch (e) {
    showMsg('✗ ' + e.message, 'err');
  }
}

async function runPipeline() {
  showMsg('Starting full pipeline…', 'ok');
  try {
    await fetch('/api/pipeline/run', { method: 'POST' });
    showMsg('✓ Full pipeline started in background.', 'ok');
  } catch (e) {
    showMsg('✗ ' + e.message, 'err');
  }
}

function showMsg(text, type) {
  const el = document.getElementById('pipelineMsg');
  el.style.display = 'block';
  el.className = 'msg msg-' + type;
  el.textContent = text;
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

function refreshAll() { load(); loadStatus(); if(window.DU) DU.markUpdated(); }
refreshAll();
setInterval(refreshAll, 10000);
</script>
<script src="dashboard_utils.js"></script>
<script src="nav.js"></script>
</body>
</html>
