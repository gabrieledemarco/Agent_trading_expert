<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pipeline Kanban</title><link rel="stylesheet" href="colors_and_type.css"><style>body{margin:0;background:var(--bg-primary);color:var(--text-secondary);font-family:var(--font)}.wrap{padding:12px}.board{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.col{background:var(--bg-secondary);border:1px solid var(--border);padding:8px}.card{border:1px solid var(--border);background:var(--bg-primary);padding:6px;margin-bottom:6px}.title{color:var(--orange);font-size:11px;text-transform:uppercase;margin-bottom:6px}</style></head><body><div class="wrap"><h2 style="margin:0 0 10px;color:var(--text-primary)">Pipeline — Kanban View</h2><div class="board" id="board"></div></div><script>
const columns=['draft','backtest_pending','validation_pending','approved','warning','rejected','human_review','deployed'];
async function load(){const r=await fetch('/api/pipeline/kanban');const data=await r.json();const map=data.columns||{};document.getElementById('board').innerHTML=columns.map(c=>`<div class="col"><div class="title">${c} (${(map[c]||[]).length})</div>${(map[c]||[]).map(s=>`<div class="card"><b>${s.name}</b><div>retry: ${s.retry_count||0}</div></div>`).join('')||'<div style="color:var(--text-muted)">empty</div>'}</div>`).join('');}
load();setInterval(load,10000);
</script></body></html>
