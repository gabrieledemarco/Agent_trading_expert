<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline';">
  <title>Backtest Live | Agent Trading</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{background:var(--bg-primary);color:var(--text-secondary);font-family:var(--font);font-size:12px;height:100%;overflow:hidden;}
    .terminal{display:grid;grid-template-columns:190px 1fr;grid-template-rows:40px 1fr 24px;height:100vh;transition:grid-template-columns .3s ease;}
    .terminal.sidebar-collapsed{grid-template-columns:50px 1fr;}
    .topbar{grid-column:1/-1;background:var(--bg-secondary);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 12px;}
    .topbar-left{display:flex;align-items:center;gap:12px;}
    .sidebar-toggle{background:transparent;border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;padding:6px 10px;font-size:14px;font-family:var(--font);transition:all .2s;}
    .sidebar-toggle:hover{border-color:var(--orange);color:var(--orange);}
    .topbar-brand{color:var(--orange);font-size:14px;font-weight:bold;}
    .topbar-brand span{background:var(--orange);color:#000;padding:2px 6px;border-radius:2px;font-size:10px;}
    .topbar-actions{display:flex;gap:6px;align-items:center;}
    .btn{background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-secondary);padding:4px 10px;font-size:10px;cursor:pointer;font-family:var(--font);}
    .btn:hover{background:var(--orange);color:#000;border-color:var(--orange);}
    .btn-primary{background:var(--orange);color:#000;border-color:var(--orange);font-weight:bold;}
    .btn-primary:hover{background:#ffb030;}
    .sidebar{background:var(--bg-secondary);border-right:1px solid var(--border);padding:8px 0;display:flex;flex-direction:column;overflow-y:scroll;}
    .sidebar-section{margin-bottom:10px;}
    .sidebar-title{padding:4px 12px;color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;transition:opacity .2s;}
    .sidebar-collapsed .sidebar-title{opacity:0;height:0;padding:0;overflow:hidden;}
    .sidebar-item{padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text-secondary);font-size:11px;white-space:nowrap;transition:all .2s;}
    .sidebar-collapsed .sidebar-item{padding:6px 0;justify-content:center;gap:0;}
    .sidebar-item:hover{background:var(--bg-tertiary);}
    .sidebar-item.active{color:var(--orange);background:var(--bg-tertiary);border-left:2px solid var(--orange);}
    .status-indicator{margin-top:auto;padding:8px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:10px;white-space:nowrap;}
    .status-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .main{background:var(--bg-primary);overflow-y:scroll;padding:8px;}
    .bottombar{grid-column:1/-1;background:var(--bg-secondary);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-size:10px;color:var(--text-muted);justify-content:space-between;}

    .conn-bar{display:flex;gap:8px;align-items:center;margin-bottom:8px;background:var(--bg-secondary);border:1px solid var(--border);padding:8px 12px;}
    .conn-bar input{background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-secondary);padding:4px 8px;font-family:var(--font);font-size:11px;flex:1;max-width:340px;outline:none;}
    .conn-bar input:focus{border-color:var(--orange);}
    .conn-status{font-size:10px;padding:3px 8px;}
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;}
    .kpi{background:var(--bg-secondary);border:1px solid var(--border);padding:10px;text-align:center;}
    .kpi-label{color:var(--text-muted);font-size:9px;text-transform:uppercase;margin-bottom:4px;}
    .kpi-value{font-size:16px;font-weight:bold;color:var(--text-primary);}
    .card{background:var(--bg-secondary);border:1px solid var(--border);padding:12px;margin-bottom:8px;}
    .card-title{color:var(--orange);font-size:11px;font-weight:bold;margin-bottom:8px;text-transform:uppercase;}
    .chart-container{height:180px;position:relative;}
    table{width:100%;border-collapse:collapse;font-size:11px;}
    th{text-align:left;padding:4px 8px;color:var(--text-muted);border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;font-weight:normal;}
    td{padding:5px 8px;border-bottom:1px solid var(--bg-tertiary);}
    tr:hover{background:var(--bg-tertiary);}
    .badge{padding:2px 6px;border-radius:2px;font-size:9px;}
    .badge-approved{background:var(--green-a10);color:var(--green);border:1px solid var(--green-a20);}
    .badge-rejected{background:var(--red-a10);color:var(--red);border:1px solid var(--red-a20);}
    .positive{color:var(--green);}
    .negative{color:var(--red);}
    ::-webkit-scrollbar{width:8px;height:8px;}
    ::-webkit-scrollbar-track{background:var(--bg-primary);}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  </style>
</head>
<body>
<div class="terminal">
  <header class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
      <div class="topbar-brand"><span>TA</span> BACKTEST LIVE — REMOTE</div>
    </div>
    <div class="topbar-actions">
      <span style="font-size:10px;color:var(--text-muted)" id="connLabel">Disconnected</span>
      <button class="btn btn-primary" onclick="connect()">▶ Connect</button>
      <button class="btn" onclick="loadAll()">↻ Refresh</button>
    </div>
  </header>

  <nav class="sidebar"></nav>

  <main class="main">
    <div class="conn-bar">
      <span style="color:var(--text-muted);font-size:10px;">API URL:</span>
      <input type="text" id="apiUrl" value="" placeholder="https://your-server.com or http://localhost:8000">
      <button class="btn btn-primary" onclick="connect()">Test &amp; Connect</button>
      <span id="connStatus" class="conn-status"></span>
    </div>

    <div id="liveContent" style="display:none;">
      <div class="kpi-row" id="kpiRow">
        <div class="kpi"><div class="kpi-label">Research Papers</div><div class="kpi-value" style="color:var(--blue)" id="kpiResearch">—</div></div>
        <div class="kpi"><div class="kpi-label">Models Validated</div><div class="kpi-value" style="color:var(--green)" id="kpiValidated">—</div></div>
        <div class="kpi"><div class="kpi-label">Current Equity</div><div class="kpi-value" id="kpiEquity">—</div></div>
        <div class="kpi"><div class="kpi-label">Total Return</div><div class="kpi-value" id="kpiReturn">—</div></div>
      </div>

      <div class="card">
        <div class="card-title">Equity Curve (30 days)</div>
        <div class="chart-container"><canvas id="equityChart"></canvas></div>
      </div>

      <div class="card">
        <div class="card-title">Validated Strategies</div>
        <table>
          <thead><tr><th>Model</th><th>Status</th><th>Risk</th><th>Sharpe</th><th>Robustness</th></tr></thead>
          <tbody id="strategiesList"></tbody>
        </table>
      </div>
    </div>
  </main>

  <footer class="bottombar">
    <div>Backtest Live — Remote API connection</div>
    <div>Agent Trading Expert — V2</div>
  </footer>
</div>

<script>
let equityChart = null;

function apiBase() {
  return (document.getElementById('apiUrl').value || '').replace(/\/$/, '');
}

async function connect() {
  const statusEl = document.getElementById('connStatus');
  const connLabel = document.getElementById('connLabel');
  statusEl.style.color = 'var(--blue)';
  statusEl.textContent = '⟳ Connecting…';
  try {
    const r = await fetch(apiBase() + '/health');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    statusEl.style.color = 'var(--green)';
    statusEl.textContent = '✓ Connected';
    connLabel.textContent = 'Connected: ' + apiBase();
    connLabel.style.color = 'var(--green)';
    document.getElementById('liveContent').style.display = 'block';
    loadAll();
  } catch (e) {
    statusEl.style.color = 'var(--red)';
    statusEl.textContent = '✗ ' + e.message;
    connLabel.textContent = 'Disconnected';
    connLabel.style.color = 'var(--text-muted)';
    document.getElementById('liveContent').style.display = 'none';
  }
}

async function loadAll() {
  const base = apiBase();
  try {
    const [summary, strategies, curve] = await Promise.all([
      fetch(base + '/dashboard/summary').then(r => r.json()),
      fetch(base + '/strategies').then(r => r.json()),
      fetch(base + '/api/equity-curve?period=1M').then(r => r.json()),
    ]);

    document.getElementById('kpiResearch').textContent = summary.research_papers || 0;
    document.getElementById('kpiValidated').textContent = summary.models_validated || 0;
    document.getElementById('kpiEquity').textContent = '$' + Number(summary.current_equity || 0).toLocaleString();
    const ret = (summary.total_return || 0) * 100;
    document.getElementById('kpiReturn').innerHTML = `<span class="${ret >= 0 ? 'positive' : 'negative'}">${ret.toFixed(2)}%</span>`;

    // Equity chart
    const labels = curve.labels || [];
    const equity = curve.equity || [];
    if (equityChart) equityChart.destroy();
    const ctx = document.getElementById('equityChart').getContext('2d');
    equityChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          label: 'Equity',
          data: equity,
          borderColor: '#ff9900',
          backgroundColor: 'rgba(255,153,0,0.05)',
          borderWidth: 1.5,
          pointRadius: 0,
          tension: 0.3,
        }],
      },
      options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: '#1a1a1a' }, ticks: { color: '#666', font: { size: 9 } } },
          y: { grid: { color: '#1a1a1a' }, ticks: { color: '#666', font: { size: 9 } } },
        },
      },
    });

    // Strategies table
    const rows = (strategies.strategies || []).map(s => {
      const st = (s.validation_status || s.status || '').toUpperCase();
      const cls = st === 'APPROVED' ? 'badge-approved' : 'badge-rejected';
      return `<tr>
        <td>${s.model_name || s.name || '—'}</td>
        <td><span class="badge ${cls}">${st || '—'}</span></td>
        <td>${s.risk_score || s.risk_level || '—'}</td>
        <td>${s.sharpe_ratio != null ? Number(s.sharpe_ratio).toFixed(3) : '—'}</td>
        <td>${s.robustness_score || s.robustness || '—'}</td>
      </tr>`;
    }).join('');
    document.getElementById('strategiesList').innerHTML = rows || '<tr><td colspan="5" style="color:var(--text-muted)">No strategies.</td></tr>';
  } catch (e) {
    console.warn('loadAll error:', e);
  }
}

// Auto-connect to same origin
window.addEventListener('load', function () {
  const input = document.getElementById('apiUrl');
  if (!input.value) input.value = window.location.origin;
  setTimeout(connect, 300);
});
</script>
<script src="nav.js"></script>
</body>
</html>
