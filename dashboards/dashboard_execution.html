<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';">
  <title>Execution | Agent Trading</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{background:var(--bg-primary);color:var(--text-secondary);font-family:var(--font);font-size:12px;height:100%;overflow:hidden;}
    .terminal{display:grid;grid-template-columns:190px 1fr;grid-template-rows:40px 1fr 24px;height:100vh;transition:grid-template-columns .3s ease;}
    .terminal.sidebar-collapsed{grid-template-columns:50px 1fr;}
    .topbar{grid-column:1/-1;background:var(--bg-secondary);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 12px;}
    .topbar-left{display:flex;align-items:center;gap:12px;}
    .sidebar-toggle{background:transparent;border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;padding:6px 10px;font-size:14px;font-family:var(--font);transition:all .2s;}
    .sidebar-toggle:hover{border-color:var(--orange);color:var(--orange);}
    .topbar-brand{color:var(--orange);font-size:14px;font-weight:bold;}
    .topbar-brand span{background:var(--orange);color:#000;padding:2px 6px;border-radius:2px;font-size:10px;}
    .topbar-actions{display:flex;gap:6px;}
    .btn{background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-secondary);padding:4px 10px;font-size:10px;cursor:pointer;font-family:var(--font);}
    .btn:hover{background:var(--orange);color:#000;border-color:var(--orange);}
    .btn-green:hover{background:var(--green);border-color:var(--green);}
    .sidebar{background:var(--bg-secondary);border-right:1px solid var(--border);padding:8px 0;display:flex;flex-direction:column;overflow-y:scroll;}
    .sidebar-section{margin-bottom:10px;}
    .sidebar-title{padding:4px 12px;color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;transition:opacity .2s;}
    .sidebar-collapsed .sidebar-title{opacity:0;height:0;padding:0;overflow:hidden;}
    .sidebar-item{padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text-secondary);font-size:11px;white-space:nowrap;transition:all .2s;}
    .sidebar-collapsed .sidebar-item{padding:6px 0;justify-content:center;gap:0;}
    .sidebar-item:hover{background:var(--bg-tertiary);}
    .sidebar-item.active{color:var(--orange);background:var(--bg-tertiary);border-left:2px solid var(--orange);}
    .status-indicator{margin-top:auto;padding:8px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:10px;white-space:nowrap;}
    .status-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .main{background:var(--bg-primary);overflow-y:scroll;padding:8px;}
    .bottombar{grid-column:1/-1;background:var(--bg-secondary);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-size:10px;color:var(--text-muted);justify-content:space-between;}

    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px;}
    .kpi{background:var(--bg-secondary);border:1px solid var(--border);padding:10px;text-align:center;}
    .kpi-label{color:var(--text-muted);font-size:9px;text-transform:uppercase;margin-bottom:4px;}
    .kpi-value{font-size:16px;font-weight:bold;color:var(--text-primary);}
    .card{background:var(--bg-secondary);border:1px solid var(--border);padding:12px;margin-bottom:8px;}
    .card-title{color:var(--orange);font-size:11px;font-weight:bold;margin-bottom:8px;text-transform:uppercase;}
    table{width:100%;border-collapse:collapse;font-size:11px;}
    th{text-align:left;padding:4px 8px;color:var(--text-muted);border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;font-weight:normal;}
    td{padding:5px 8px;border-bottom:1px solid var(--bg-tertiary);}
    tr:hover{background:var(--bg-tertiary);}
    .buy{color:var(--green);}
    .sell{color:var(--red);}
    .trade-form{display:flex;gap:8px;align-items:center;margin-bottom:12px;flex-wrap:wrap;}
    .trade-form select,.trade-form input{background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-secondary);padding:4px 8px;font-family:var(--font);font-size:11px;outline:none;}
    .trade-form select:focus,.trade-form input:focus{border-color:var(--orange);}
    .msg{padding:6px 10px;font-size:10px;border-radius:2px;margin-bottom:8px;}
    .msg-ok{background:var(--green-a10);color:var(--green);border:1px solid var(--green-a20);}
    .msg-err{background:var(--red-a10);color:var(--red);border:1px solid var(--red-a20);}
    .positive{color:var(--green);}
    .negative{color:var(--red);}
    ::-webkit-scrollbar{width:8px;height:8px;}
    ::-webkit-scrollbar-track{background:var(--bg-primary);}
    ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  </style>
</head>
<body>
<div class="terminal">
  <header class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
      <div class="topbar-brand"><span>TA</span> EXECUTION — PAPER TRADING</div>
    </div>
    <div class="topbar-actions">
      <button class="btn" onclick="load()">↻ Refresh</button>
    </div>
  </header>

  <nav class="sidebar"></nav>

  <main class="main">
    <div class="kpi-row" id="kpiRow">
      <div class="kpi"><div class="kpi-label">Current Equity</div><div class="kpi-value" id="kpiEquity">—</div></div>
      <div class="kpi"><div class="kpi-label">Total Return</div><div class="kpi-value" id="kpiReturn">—</div></div>
      <div class="kpi"><div class="kpi-label">Sharpe Ratio</div><div class="kpi-value" id="kpiSharpe">—</div></div>
      <div class="kpi"><div class="kpi-label">Mode</div><div class="kpi-value" style="color:var(--yellow)">PAPER</div></div>
    </div>

    <div class="card">
      <div class="card-title">Execute Trade</div>
      <div class="trade-form">
        <select id="tradeSymbol">
          <option>AAPL</option><option>MSFT</option><option>GOOG</option>
          <option>AMZN</option><option>NVDA</option><option>TSLA</option>
        </select>
        <select id="tradeAction">
          <option value="BUY">BUY</option>
          <option value="SELL">SELL</option>
        </select>
        <input type="number" id="tradeQty" value="10" min="1" style="width:80px;" placeholder="Qty">
        <button class="btn btn-green" onclick="executeTrade()">▶ Execute</button>
      </div>
      <div id="tradeMsg" style="display:none;"></div>
    </div>

    <div class="card">
      <div class="card-title">Trade History (last 20)</div>
      <table>
        <thead><tr><th>Time</th><th>Symbol</th><th>Side</th><th>Qty</th><th>Price</th></tr></thead>
        <tbody id="trades"></tbody>
      </table>
    </div>
  </main>

  <footer class="bottombar">
    <div>Execution Engine | Paper Trading Mode</div>
    <div>Agent Trading Expert — V2</div>
  </footer>
</div>

<script>
async function load() {
  try {
    const [perf, trades] = await Promise.all([
      fetch('/performance').then(r => r.json()),
      fetch('/api/trades?limit=20').then(r => r.json()),
    ]);
    const ret = (perf.total_return || 0) * 100;
    document.getElementById('kpiEquity').textContent = '$' + Number(perf.current_equity || 0).toLocaleString();
    document.getElementById('kpiReturn').innerHTML = `<span class="${ret >= 0 ? 'positive' : 'negative'}">${ret.toFixed(2)}%</span>`;
    document.getElementById('kpiSharpe').textContent = Number(perf.sharpe_ratio || 0).toFixed(2);

    const rows = (trades.trades || []).map(t => `<tr>
      <td>${String(t.timestamp || '').slice(11, 19)}</td>
      <td>${t.symbol || ''}</td>
      <td class="${(t.action||'').toUpperCase()==='BUY' ? 'buy' : 'sell'}">${t.action || ''}</td>
      <td>${t.quantity || ''}</td>
      <td>$${Number(t.price || 0).toFixed(2)}</td>
    </tr>`).join('');
    document.getElementById('trades').innerHTML = rows || '<tr><td colspan="5" style="color:var(--text-muted)">No trades yet.</td></tr>';
  } catch (e) {
    console.warn('Execution load error:', e);
  }
}

async function executeTrade() {
  const symbol = document.getElementById('tradeSymbol').value;
  const action = document.getElementById('tradeAction').value;
  const quantity = parseFloat(document.getElementById('tradeQty').value);
  const msg = document.getElementById('tradeMsg');
  msg.style.display = 'block';
  msg.className = 'msg msg-ok';
  msg.textContent = 'Executing...';
  try {
    const r = await fetch('/trade/execute', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ symbol, action, quantity }),
    });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Error');
    const t = d.trade;
    msg.textContent = `✓ ${t.action} ${t.quantity} ${t.symbol} @ $${Number(t.price).toFixed(2)}`;
    load();
  } catch (e) {
    msg.className = 'msg msg-err';
    msg.textContent = '✗ ' + e.message;
  }
}

load();
setInterval(load, 10000);
</script>
<script src="nav.js"></script>
</body>
</html>
