<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Execution</title><link rel="stylesheet" href="colors_and_type.css"><style>body{margin:0;background:var(--bg-primary);color:var(--text-secondary);font-family:var(--font);padding:12px}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.card{background:var(--bg-secondary);border:1px solid var(--border);padding:10px}.label{color:var(--text-muted);font-size:10px}.value{font-size:18px;color:var(--text-primary);font-weight:700}table{margin-top:10px;width:100%;border-collapse:collapse;background:var(--bg-secondary);border:1px solid var(--border)}th,td{padding:6px;border-bottom:1px solid var(--border);text-align:left}th{font-size:10px;color:var(--text-muted)}</style></head><body><h2 style="margin:0 0 10px;color:var(--text-primary)">Execution — Paper Trading</h2><div class="cards" id="cards"></div><table><thead><tr><th>Time</th><th>Symbol</th><th>Side</th><th>Qty</th><th>Price</th></tr></thead><tbody id="trades"></tbody></table><script>async function load(){const [perf,trades]=await Promise.all([fetch('/performance').then(r=>r.json()),fetch('/api/trades?limit=20').then(r=>r.json())]);document.getElementById('cards').innerHTML=`<div class='card'><div class='label'>Current Equity</div><div class='value'>$${Number(perf.current_equity||0).toLocaleString()}</div></div><div class='card'><div class='label'>Total Return</div><div class='value'>${((perf.total_return||0)*100).toFixed(2)}%</div></div><div class='card'><div class='label'>Sharpe</div><div class='value'>${Number(perf.sharpe_ratio||0).toFixed(2)}</div></div><div class='card'><div class='label'>Mode</div><div class='value'>PAPER</div></div>`;document.getElementById('trades').innerHTML=(trades.trades||[]).map(t=>`<tr><td>${String(t.timestamp||'').slice(11,19)}</td><td>${t.symbol||''}</td><td>${t.action||''}</td><td>${t.quantity||''}</td><td>${t.price||''}</td></tr>`).join('')||'<tr><td colspan="5">Nessun trade.</td></tr>';}
load();setInterval(load,10000);</script></body></html>
