<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Trading Expert | Pipeline Overview</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <style>
    *{box-sizing:border-box}body{margin:0;background:var(--bg-primary);color:var(--text-secondary);font-family:var(--font);font-size:12px}
    .layout{display:grid;grid-template-columns:190px 1fr;min-height:100vh}
    .sidebar{border-right:1px solid var(--border);background:var(--bg-secondary);padding:8px 0;display:flex;flex-direction:column;overflow-y:auto}
    .sidebar-section{margin-bottom:10px}
    .sidebar-title{padding:4px 12px;color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:1px}
    .sidebar-item{padding:6px 12px;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text-secondary);font-size:11px}
    .sidebar-item:hover{background:var(--bg-tertiary)}
    .sidebar-item.active{color:var(--orange);background:var(--bg-tertiary);border-left:2px solid var(--orange)}
    .status-indicator{margin-top:auto;padding:8px 12px;border-top:1px solid var(--border);display:flex;align-items:center;gap:6px;font-size:10px}
    .status-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .main{padding:12px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.status{font-size:11px;color:var(--text-muted)}
    .grid{display:grid;gap:10px;grid-template-columns:repeat(12,1fr)}.card{background:var(--bg-secondary);border:1px solid var(--border);padding:10px}
    .title{color:var(--orange);font-size:11px;margin-bottom:8px;text-transform:uppercase}
    .span-12{grid-column:span 12}.span-6{grid-column:span 6}.span-4{grid-column:span 4}
    .health{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stage{border:1px solid var(--border);padding:8px;background:var(--bg-primary)}
    .num{font-size:20px;color:var(--text-primary);font-weight:700}.warn{color:var(--yellow)}.bad{color:var(--red)}.ok{color:var(--green)}
    table{width:100%;border-collapse:collapse}th,td{padding:6px;border-bottom:1px solid var(--border);text-align:left}th{font-size:10px;color:var(--text-muted)}
    .alert{background:var(--red-a10);border:1px solid var(--red-a20);color:var(--red);padding:8px}
  </style>
</head>
<body>
<div class="layout">
  <nav class="sidebar"></nav>
  <main class="main">
    <div class="top">
      <h2 style="margin:0;color:var(--text-primary)">Overview — Pipeline Health</h2>
      <div class="status">🟢 LIVE · PAPER MODE · Neon Connected</div>
    </div>

    <section class="grid">
      <article class="card span-12">
        <div class="title">Pipeline Health (24h)</div>
        <div class="health" id="pipelineHealth"></div>
      </article>

      <article class="card span-8">
        <div class="title">Active Execution</div>
        <div id="executionMetrics">Caricamento…</div>
      </article>

      <article class="card span-4">
        <div class="title">Human Review</div>
        <div id="humanReviewBox" class="alert">Nessuna strategia in human_review.</div>
      </article>

      <article class="card span-12">
        <div class="title">Event Stream (ultimi eventi)</div>
        <table>
          <thead><tr><th>Time</th><th>Agent</th><th>Status</th><th>Message</th></tr></thead>
          <tbody id="eventRows"></tbody>
        </table>
      </article>
    </section>
  </main>
</div>

<script>
async function loadOverview(){
  try{
    const [ov, perf] = await Promise.all([
      fetch('/api/pipeline/overview').then(r=>r.json()),
      fetch('/dashboard/summary').then(r=>r.json())
    ]);

    const counts = ov.counts || {};
    const stages = [
      ['Research','draft'],
      ['Model','backtest_pending'],
      ['Strategy','validation_pending'],
      ['Validate','approved']
    ];
    const health = document.getElementById('pipelineHealth');
    health.innerHTML = stages.map(([label,key])=>{
      const val = counts[key] || 0;
      const cls = val===0 ? 'warn' : 'ok';
      return `<div class="stage"><div>${label}</div><div class="num ${cls}">${val}</div><div style="color:var(--text-muted)">${key}</div></div>`;
    }).join('');

    document.getElementById('executionMetrics').innerHTML = `
      <div>Portfolio Value: <b>$${Number(perf.current_equity || 0).toLocaleString()}</b></div>
      <div>Total Return: <b>${((perf.total_return || 0)*100).toFixed(2)}%</b></div>
      <div>Approved Strategies: <b>${counts.approved || 0}</b></div>
      <div>Deployed Strategies: <b>${counts.deployed || 0}</b></div>
    `;

    const hrCount = ov.human_review_count || 0;
    document.getElementById('humanReviewBox').textContent = hrCount > 0
      ? `⚠️ ${hrCount} strategia/e richiedono revisione umana.`
      : 'Nessuna strategia in human_review.';

    const rows = (ov.recent_events || []).slice(0,10).map(e=>`<tr><td>${String(e.timestamp||'').slice(11,19)}</td><td>${e.agent||'-'}</td><td>${e.status||'-'}</td><td>${e.message||''}</td></tr>`).join('');
    document.getElementById('eventRows').innerHTML = rows || '<tr><td colspan="4">Nessun evento.</td></tr>';
  }catch(err){
    console.error(err);
  }
}
loadOverview();
setInterval(loadOverview, 10000);
</script>
<script src="nav.js"></script>
</body>
</html>
