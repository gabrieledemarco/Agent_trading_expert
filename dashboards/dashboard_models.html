<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Models</title><link rel="stylesheet" href="colors_and_type.css"><style>body{margin:0;background:var(--bg-primary);color:var(--text-secondary);font-family:var(--font);padding:12px}table{width:100%;border-collapse:collapse;background:var(--bg-secondary);border:1px solid var(--border)}th,td{padding:8px;border-bottom:1px solid var(--border);text-align:left}th{font-size:10px;color:var(--text-muted)}</style></head><body><h2 style="margin:0 0 10px;color:var(--text-primary)">Models — ML Engine</h2><table><thead><tr><th>ID</th><th>Architecture</th><th>Directional Acc.</th><th>R²</th><th>Status</th></tr></thead><tbody id="rows"><tr><td colspan="5">Caricamento…</td></tr></tbody></table><script>
async function load(){try{const r=await fetch('/models');const d=await r.json();const rows=(d.models||[]).map(m=>`<tr><td>${m.id||'-'}</td><td>${m.model_type||m.architecture||'-'}</td><td>${m.directional_accuracy??'-'}</td><td>${m.r2_score??'-'}</td><td>${m.status||'-'}</td></tr>`).join('');document.getElementById('rows').innerHTML=rows||'<tr><td colspan="5">Nessun modello.</td></tr>';}catch(e){document.getElementById('rows').innerHTML='<tr><td colspan="5">Errore caricamento.</td></tr>';}}
load();</script></body></html>
