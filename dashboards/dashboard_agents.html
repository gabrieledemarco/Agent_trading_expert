<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline';">
  <title>Agents | Agent Trading</title>
  <link rel="stylesheet" href="colors_and_type.css">
  <style>
    /* S6-B2 */
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{background:var(--bg-primary);color:var(--text-secondary);font-family:var(--font);font-size:12px;height:100%;overflow:hidden;}
    .terminal{display:grid;grid-template-columns:190px 1fr;grid-template-rows:40px 1fr 24px;height:100vh;transition:grid-template-columns .3s ease;}
    .terminal.sidebar-collapsed{grid-template-columns:50px 1fr;}
    .topbar{grid-column:1/-1;background:var(--bg-secondary);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 12px;}
    .topbar-left{display:flex;align-items:center;gap:10px;}
    .topbar-right{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text-muted);}
    .sidebar-toggle{background:transparent;border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;padding:5px 9px;font-size:13px;font-family:var(--font);transition:all .2s;}
    .sidebar-toggle:hover{border-color:var(--orange);color:var(--orange);}
    .brand{color:var(--orange);font-size:13px;font-weight:bold;}
    .brand span{background:var(--orange);color:#000;padding:1px 5px;border-radius:2px;font-size:9px;margin-right:4px;}
    .btn{background:var(--bg-tertiary);border:1px solid var(--border);color:var(--text-secondary);padding:3px 9px;font-size:10px;cursor:pointer;font-family:var(--font);}
    .btn:hover{background:var(--orange);color:#000;border-color:var(--orange);}
    .sidebar{background:var(--bg-secondary);border-right:1px solid var(--border);padding:8px 0;display:flex;flex-direction:column;overflow-y:auto;}
    .sidebar-section{margin-bottom:10px;}
    .sidebar-title{padding:4px 12px;color:var(--text-muted);font-size:10px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap;}
    .sidebar-collapsed .sidebar-title{opacity:0;height:0;padding:0;overflow:hidden;}
    .sidebar-item{padding:6px 12px;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--text-secondary);font-size:11px;white-space:nowrap;transition:all .2s;}
    .sidebar-collapsed .sidebar-item{padding:6px 0;justify-content:center;}
    .sidebar-item:hover{background:var(--bg-tertiary);}
    .sidebar-item.active{color:var(--orange);background:var(--bg-tertiary);border-left:2px solid var(--orange);}
    .main{background:var(--bg-primary);overflow-y:scroll;padding:8px;}
    ::-webkit-scrollbar{width:8px;} ::-webkit-scrollbar-track{background:var(--bg-primary);} ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
    .kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:8px;}
    .kpi{background:var(--bg-secondary);border:1px solid var(--border);padding:8px;text-align:center;}
    .kpi-label{color:var(--text-muted);font-size:9px;text-transform:uppercase;margin-bottom:3px;}
    .kpi-value{font-size:15px;font-weight:bold;}
    .agents-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
    /* S6-B3 */
    .agent-card{background:var(--bg-secondary);border:1px solid var(--border);padding:12px;cursor:pointer;transition:border-color .2s;}
    .agent-card:hover{border-color:var(--orange);}
    .agent-card.active{border-color:var(--green);}
    .agent-card.error{border-color:var(--red);}
    .agent-card.idle{border-color:var(--border);}
    .agent-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
    .agent-name{color:var(--text-primary);font-size:11px;font-weight:bold;}
    .agent-type{color:var(--text-muted);font-size:9px;margin-bottom:8px;}
    .agent-meta{display:grid;grid-template-columns:1fr 1fr;gap:2px;font-size:10px;margin-bottom:8px;}
    .ml{color:var(--text-muted);}
    .agent-bar{height:2px;background:var(--bg-tertiary);border-radius:1px;margin-top:4px;}
    .agent-bar-fill{height:2px;border-radius:1px;background:var(--orange);}
    .badge{padding:2px 6px;border-radius:2px;font-size:9px;}
    .badge-active,.badge-running{background:var(--green-a10);color:var(--green);border:1px solid var(--green-a20);}
    .badge-error,.badge-failed{background:var(--red-a10);color:var(--red);border:1px solid var(--red-a20);}
    .badge-idle,.badge-never_run{background:var(--bg-tertiary);color:var(--text-muted);border:1px solid var(--border);}
    .badge-success,.badge-completed{background:var(--green-a10);color:var(--green);border:1px solid var(--green-a20);}
    .badge-warning{background:rgba(255,204,0,.1);color:var(--yellow);border:1px solid rgba(255,204,0,.3);}
    /* Drill-down overlay */
    .drilldown{position:fixed;top:40px;right:0;bottom:24px;width:380px;background:var(--bg-secondary);border-left:1px solid var(--border);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .25s ease;z-index:100;}
    .drilldown.open{transform:translateX(0);}
    .drilldown-header{padding:12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
    .drilldown-title{color:var(--orange);font-size:11px;text-transform:uppercase;font-weight:bold;}
    .drilldown-close{background:transparent;border:none;color:var(--text-muted);cursor:pointer;font-size:16px;font-family:var(--font);}
    .drilldown-body{flex:1;overflow-y:auto;padding:12px;}
    .drilldown-section{margin-bottom:12px;}
    .drilldown-section-title{color:var(--text-muted);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
    .stat-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid var(--bg-tertiary);font-size:11px;}
    .stat-row .sk{color:var(--text-muted);}
    /* Card + activity table */
    .card{background:var(--bg-secondary);border:1px solid var(--border);padding:10px;margin-bottom:8px;}
    .card-title{color:var(--orange);font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;justify-content:space-between;}
    table{width:100%;border-collapse:collapse;font-size:11px;}
    th{text-align:left;padding:4px 8px;color:var(--text-muted);border-bottom:1px solid var(--border);font-size:9px;text-transform:uppercase;font-weight:normal;}
    td{padding:4px 8px;border-bottom:1px solid var(--bg-tertiary);}
    tr:hover{background:var(--bg-tertiary);}
    .bottombar{grid-column:1/-1;background:var(--bg-secondary);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-size:10px;color:var(--text-muted);justify-content:space-between;}
    .positive{color:var(--green);} .negative{color:var(--red);} .neutral{color:var(--text-primary);}
  </style>
</head>
<body>
<div class="terminal">
  <header class="topbar">
    <div class="topbar-left">
      <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
      <div class="brand"><span>TA</span> AGENT MONITOR</div>
    </div>
    <div class="topbar-right">
      Last update: <span id="lastUpdate" style="color:var(--orange)">—</span>
      <button class="btn" onclick="refreshAll()">↻ Refresh</button>
    </div>
  </header>
  <nav class="sidebar"></nav>
  <main class="main">
    <!-- S6-B5 -->
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Total Agents</div><div class="kpi-value neutral" id="kpiTotal">—</div></div>
      <div class="kpi"><div class="kpi-label">Active</div><div class="kpi-value" style="color:var(--green)" id="kpiActive">—</div></div>
      <div class="kpi"><div class="kpi-label">Idle</div><div class="kpi-value neutral" id="kpiIdle">—</div></div>
      <div class="kpi"><div class="kpi-label">Errors</div><div class="kpi-value" style="color:var(--red)" id="kpiErrors">—</div></div>
      <div class="kpi"><div class="kpi-label">Never Run</div><div class="kpi-value neutral" id="kpiNever">—</div></div>
    </div>
    <div class="agents-grid" id="agentsGrid">
      <div class="agent-card idle"><div class="agent-name" style="color:var(--text-muted)">Loading agents…</div></div>
    </div>
    <!-- S6-B6 -->
    <div class="card">
      <div class="card-title">
        <span>RECENT ACTIVITY</span>
        <span id="logCount" style="color:var(--text-muted);font-size:9px;">—</span>
      </div>
      <table>
        <thead><tr><th>Time</th><th>Agent</th><th>Status</th><th>Message</th><th>Duration</th></tr></thead>
        <tbody id="activityRows"><tr><td colspan="5" style="color:var(--text-muted)">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>
  <footer class="bottombar">
    <div>Agent Monitor | auto-refresh 15s</div>
    <div>Agent Trading Expert — V2</div>
  </footer>
</div>
<div class="drilldown" id="drilldown">
  <div class="drilldown-header">
    <span class="drilldown-title" id="ddTitle">Agent Detail</span>
    <button class="drilldown-close" onclick="closeDrilldown()">✕</button>
  </div>
  <div class="drilldown-body">
    <div class="drilldown-section">
      <div class="drilldown-section-title">Status</div>
      <div id="ddStatus"></div>
    </div>
    <div class="drilldown-section">
      <div class="drilldown-section-title">Metrics</div>
      <div id="ddMetrics"></div>
    </div>
    <div class="drilldown-section">
      <div class="drilldown-section-title">Run History</div>
      <table>
        <thead><tr><th>Time</th><th>Status</th><th>Duration</th><th>Records</th></tr></thead>
        <tbody id="ddHistory"><tr><td colspan="4" style="color:var(--text-muted)">Loading…</td></tr></tbody>
      </table>
    </div>
    <div style="margin-top:12px;">
      <button class="btn" style="width:100%;padding:6px;" id="ddTriggerBtn" onclick="triggerAgent()">▶ Trigger Agent Now</button>
      <div id="ddTriggerResult" style="margin-top:6px;font-size:10px;"></div>
    </div>
  </div>
</div>
<!-- S6-B7 -->
<script>
let allAgents = [];
let selectedAgent = null;

const STATUS_ORDER = { running: 0, active: 1, error: 2, failed: 3, warning: 4, completed: 5, success: 6, idle: 7, never_run: 8 };

function agentCardClass(status) {
  const s = (status || 'idle').toLowerCase();
  if (s === 'running' || s === 'active') return 'active';
  if (s === 'error' || s === 'failed') return 'error';
  return 'idle';
}

function badgeClass(status) {
  return 'badge badge-' + (status || 'idle').toLowerCase().replace(/[^a-z_]/g, '');
}

function renderAgents(agents) {
  const grid = document.getElementById('agentsGrid');
  if (!grid) return;
  if (!agents.length) { grid.innerHTML = '<div class="agent-card idle"><div class="agent-name" style="color:var(--text-muted)">No agents found.</div></div>'; return; }

  let total = agents.length, active = 0, idle = 0, errors = 0, never = 0;
  grid.innerHTML = agents.map(a => {
    const st  = (a.last_status || 'never_run').toLowerCase();
    const cls = agentCardClass(st);
    if (st === 'running' || st === 'active') active++;
    else if (st === 'error' || st === 'failed') errors++;
    else if (st === 'never_run') never++;
    else idle++;

    const dur = a.duration_ms ? (a.duration_ms / 1000).toFixed(1) + 's' : '—';
    const rec = a.records_written ?? '—';
    const lastRun = a.last_run ? String(a.last_run).slice(0, 16).replace('T', ' ') : 'Never';
    const esc = window.DU ? DU.escape : function(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});};
    return `<div class="agent-card ${cls}" onclick="openDrilldown('${esc(a.agent_name)}')">
      <div class="agent-header">
        <div class="agent-name">${esc(a.agent_name) || '?'}</div>
        <span class="${badgeClass(st)}">${esc(st)}</span>
      </div>
      <div class="agent-type">${a.last_message ? esc(String(a.last_message).slice(0, 60)) : 'No activity'}</div>
      <div class="agent-meta">
        <span class="ml">Last run</span><span>${lastRun}</span>
        <span class="ml">Duration</span><span>${dur}</span>
        <span class="ml">Records</span><span>${rec}</span>
      </div>
    </div>`;
  }).join('');

  document.getElementById('kpiTotal').textContent  = total;
  document.getElementById('kpiActive').textContent  = active;
  document.getElementById('kpiIdle').textContent    = idle;
  document.getElementById('kpiErrors').textContent  = errors;
  document.getElementById('kpiNever').textContent   = never;
}

function openDrilldown(agentName) {
  selectedAgent = agentName;
  document.getElementById('ddTitle').textContent = agentName;
  const agent = allAgents.find(a => a.agent_name === agentName) || {};
  const st = agent.last_status || 'unknown';

  document.getElementById('ddStatus').innerHTML =
    `<span class="${badgeClass(st)}">${st}</span>` +
    (agent.error_detail ? `<div style="color:var(--red);font-size:10px;margin-top:4px;">${agent.error_detail}</div>` : '');

  document.getElementById('ddMetrics').innerHTML = [
    ['Last Run',  agent.last_run ? String(agent.last_run).slice(0,16).replace('T',' ') : 'Never'],
    ['Duration',  agent.duration_ms ? (agent.duration_ms/1000).toFixed(2)+'s' : '—'],
    ['Records',   agent.records_written ?? '—'],
    ['Message',   agent.last_message ? String(agent.last_message).slice(0,80) : '—'],
  ].map(([k,v]) => `<div class="stat-row"><span class="sk">${k}</span><span>${v}</span></div>`).join('');

  document.getElementById('drilldown').classList.add('open');
  document.getElementById('ddTriggerResult').textContent = '';
  loadHistory(agentName);
}

function closeDrilldown() {
  document.getElementById('drilldown').classList.remove('open');
  selectedAgent = null;
}
</script>
<!-- S6-B8 -->
<script>
async function loadHistory(agentName) {
  const tbody = document.getElementById('ddHistory');
  if (!tbody) return;
  tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text-muted)">Loading…</td></tr>';
  try {
    const d = await fetch(`/api/agents/${encodeURIComponent(agentName)}/history?limit=15`).then(r => r.json());
    const rows = d.history || [];
    if (!rows.length) { tbody.innerHTML = '<tr><td colspan="4" style="color:var(--text-muted)">No history.</td></tr>'; return; }
    tbody.innerHTML = rows.map(r => {
      const st  = (r.status || r.last_status || 'unknown').toLowerCase();
      const dur = r.duration_ms ? (r.duration_ms / 1000).toFixed(1) + 's' : '—';
      const rec = r.records_written ?? '—';
      const ts  = String(r.timestamp || r.last_run || '').slice(0, 16).replace('T', ' ');
      return `<tr>
        <td>${ts}</td>
        <td><span class="${badgeClass(st)}">${st}</span></td>
        <td>${dur}</td>
        <td>${rec}</td>
      </tr>`;
    }).join('');
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="4" style="color:var(--red)">Error loading history.</td></tr>';
  }
}

async function triggerAgent() {
  if (!selectedAgent) return;
  const btn = document.getElementById('ddTriggerBtn');
  const res = document.getElementById('ddTriggerResult');
  btn.disabled = true;
  btn.textContent = 'Triggering…';
  res.style.color = 'var(--text-muted)';
  res.textContent = 'Sending request…';
  const phaseMap = {
    ResearchAgent:       'research',
    SpecAgent:           'spec',
    MLEngineerAgent:     'ml',
    ValidationAgent:     'validation',
    ImprovementAgent:    'improvement',
    TradingExecutorAgent:'trading',
    MonitoringAgent:     'monitoring',
  };
  const phase = phaseMap[selectedAgent] || selectedAgent.toLowerCase().replace('agent', '');
  try {
    const r = await fetch(`/api/pipeline/run/${encodeURIComponent(phase)}`, { method: 'POST' });
    const d = await r.json();
    res.style.color = 'var(--green)';
    res.textContent = '✓ ' + (d.message || 'Agent triggered in background');
    setTimeout(refreshAll, 3000);
  } catch (e) {
    res.style.color = 'var(--red)';
    res.textContent = '✗ ' + e.message;
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Trigger Agent Now';
  }
}

async function loadActivity() {
  try {
    const d = await fetch('/dashboard/agent-activity?limit=25').then(r => r.json());
    const logs = d.activities || [];
    const tbody = document.getElementById('activityRows');
    const ctr   = document.getElementById('logCount');
    if (!tbody) return;
    if (!logs.length) { tbody.innerHTML = '<tr><td colspan="5" style="color:var(--text-muted)">No activity.</td></tr>'; return; }
    if (ctr) ctr.textContent = logs.length + ' events';
    tbody.innerHTML = logs.map(l => {
      const st  = (l.status || 'info').toLowerCase();
      const dur = l.duration_ms ? (l.duration_ms / 1000).toFixed(1) + 's' : '—';
      const ts  = String(l.timestamp || '').slice(0, 16).replace('T', ' ');
      return `<tr>
        <td>${ts}</td>
        <td>${l.agent_name || '—'}</td>
        <td><span class="${badgeClass(st)}">${st}</span></td>
        <td style="max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${l.message || '—'}</td>
        <td>${dur}</td>
      </tr>`;
    }).join('');
  } catch (e) { console.warn('loadActivity:', e); }
}
</script>
<!-- S6-B9 -->
<script>
async function refreshAll() {
  try {
    const d = await fetch('/api/agents/status').then(r => r.json());
    allAgents = (d.agents || []).sort((a, b) =>
      (STATUS_ORDER[(a.last_status||'idle').toLowerCase()] ?? 9) -
      (STATUS_ORDER[(b.last_status||'idle').toLowerCase()] ?? 9)
    );
    renderAgents(allAgents);
    document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
    if (selectedAgent) loadHistory(selectedAgent);
  } catch (e) { console.warn('refreshAll:', e); }
  loadActivity();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrilldown(); });

window.addEventListener('load', function () {
  refreshAll();
  setInterval(refreshAll,   15000);
  setInterval(loadActivity, 20000);
});
</script>
<script src="dashboard_utils.js"></script>
<script src="nav.js"></script>
</body>
</html>
