<!DOCTYPE html><html lang="it"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Validation</title><link rel="stylesheet" href="colors_and_type.css"><style>body{margin:0;background:var(--bg-primary);color:var(--text-secondary);font-family:var(--font);padding:12px}.grid{display:grid;grid-template-columns:2fr 1fr;gap:10px}.panel{background:var(--bg-secondary);border:1px solid var(--border);padding:10px}.title{color:var(--orange);font-size:11px;text-transform:uppercase;margin-bottom:8px}table{width:100%;border-collapse:collapse}th,td{padding:6px;border-bottom:1px solid var(--border);text-align:left}th{font-size:10px;color:var(--text-muted)}</style></head><body><h2 style="margin:0 0 10px;color:var(--text-primary)">Validation — L1-L5</h2><div class="grid"><div class="panel"><div class="title">Queue</div><table><thead><tr><th>Strategy</th><th>Status</th><th>Retry</th></tr></thead><tbody id="vrows"></tbody></table></div><div class="panel"><div class="title">Feedback Loop</div><div>Le strategie con status <b>warning/rejected</b> rientrano in backtest fino a 3 retry.</div><div style="margin-top:8px;color:var(--text-muted)">Oltre soglia: <b>human_review</b>.</div></div></div><script>async function load(){const r=await fetch('/internal/v2/strategies?limit=100');const d=await r.json();const rows=(d.strategies||[]).filter(s=>['validation_pending','warning','rejected','human_review','approved'].includes(s.status)).map(s=>`<tr><td>${s.name}</td><td>${s.status}</td><td>${s.retry_count||0}</td></tr>`).join('');document.getElementById('vrows').innerHTML=rows||'<tr><td colspan="3">Nessuna strategia.</td></tr>';};load();setInterval(load,12000);</script></body></html>
