services:
  - type: web
    name: agent-trading-expert
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
      - key: ENABLE_BACKGROUND_LOOPS
        value: "false"
      - key: ENABLE_PIPELINE_AUTORUN
        value: "false"
      - key: ENABLE_MONITORING_LOOP
        value: "false"
      - key: ENABLE_TRADING_LOOP
        value: "false"
      - key: V2_EVENT_DRIVEN
        value: "false"
      - key: DATABASE_URL
        sync: false
