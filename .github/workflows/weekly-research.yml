name: Weekly Research

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6 AM
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests feedparser pyyaml beautifulsoup4

      - name: Run Research Agent
        run: |
          python -m agents.research.research_agent

      - name: Check for new findings
        id: check_findings
        run: |
          if ls data/research_findings/research_*.md 1> /dev/null 2>&1; then
            echo "findings_exist=true" >> $GITHUB_OUTPUT
            echo "files=$(ls data/research_findings/research_*.md | wc -l)" >> $GITHUB_OUTPUT
          else
            echo "findings_exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_findings.outputs.findings_exist == 'true'
        uses: actions/create-pull-request@v6
        with:
          branch: research/weekly-findings
          commit-message: "Update research findings"
          title: "Weekly Research Findings"
          body: |
            This PR contains the weekly research findings from the Research Agent.
            
            ## Summary
            - New ML/quant papers analyzed
            - Relevant papers filtered and summarized
            
            Generated by [TradingAgent](https://github.com/your-repo/trading-agents) system.
            
            *This PR was created by an AI agent on behalf of the user.*
          labels: research, automated