name: Spec Generation

on:
  push:
    branches:
      - main
    paths:
      - 'data/research_findings/**'
  workflow_dispatch:
  pull_request:
    paths:
      - 'data/research_findings/**'

jobs:
  generate-specs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Run Spec Agent
        run: |
          python -m agents.spec.spec_agent

      - name: Check for new specs
        id: check_specs
        run: |
          if ls specs/*.yaml 1> /dev/null 2>&1; then
            echo "specs_exist=true" >> $GITHUB_OUTPUT
          else
            echo "specs_exist=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.check_specs.outputs.specs_exist == 'true'
        uses: actions/create-pull-request@v6
        with:
          branch: specs/new-specifications
          commit-message: "Generate technical specifications"
          title: "Technical Specifications for ML Models"
          body: |
            This PR contains technical specifications generated from research papers.
            
            ## Details
            - Model architecture specifications
            - Action plans for implementation
            - Data requirements
            
            Generated by [TradingAgent](https://github.com/your-repo/trading-agents) system.
            
            *This PR was created by an AI agent on behalf of the user.*
          labels: specs, automated